<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monopoly Classic + QR Banking</title>
    <script src="[https://jsdelivr.net"></script]https://jsdelivr.net"></script>
    <style>
        :root {
            --board-bg: #cde6d0;
            --square-border: #111;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #111;
            color: #eee;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .action-hub {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #555;
        }
        .action-hub h3 {
            margin-top: 0;
            color: #4CAF50;
        }
        .flex-wrap {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .players {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }
        .player {
            padding: 15px;
            border: 2px solid #555;
            border-radius: 8px;
            min-width: 180px;
            background: #222;
        }
        .player.active {
            border-color: gold;
            box-shadow: 0 0 10px gold;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #45a049;
        }
        button.switch-btn {
            background: #2196F3;
            margin-top: 10px;
            width: 100%;
        }
        button.switch-btn:hover {
            background: #0b7dda;
        }
        button.tool-btn {
            background: #e67e22;
        }
        button.tool-btn:hover {
            background: #d35400;
        }
        #scanner-container {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #4CAF50;
        }
        #scanner {
            width: 100%;
            max-width: 350px;
            margin: 0 auto 15px auto;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            grid-template-rows: repeat(11, 1fr);
            width: 100%;
            max-width: 750px;
            aspect-ratio: 1 / 1;
            margin: 20px auto;
            background: var(--board-bg);
            padding: 5px;
            border: 8px solid #8B4513;
            box-sizing: border-box;
        }
        .square {
            border: 1px solid var(--square-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            text-align: center;
            font-size: 8px;
            padding: 4px;
            cursor: pointer;
            color: #111;
            box-sizing: border-box;
            background: #fafafa;
            overflow: hidden;
            font-weight: bold;
        }
        .square .name {
            line-height: 1.1;
            margin-bottom: auto;
            margin-top: auto;
        }
        .square .price {
            font-size: 7px;
            margin-top: auto;
        }
        .square.owned {
            outline: 3px solid gold;
            outline-offset: -3px;
        }
        .center-space {
            grid-column: 2 / 11;
            grid-row: 2 / 11;
            background: var(--board-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #111;
            padding: 20px;
            text-align: center;
        }
        .center-space h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #8B4513;
        }
        .color-bar {
            width: 100%;
            height: 12px;
            margin-bottom: 4px;
            border-bottom: 1px solid #111;
        }
        .log-section {
            margin-top: 25px;
        }
        .log {
            max-height: 180px;
            overflow-y: auto;
            background: #222;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🛒 Monopoly Classic + QR Banking Assistant</h1>
    <p>Manage funds, calculate rents, broker complex deals between players, or scan QR transaction slips instantly.</p>

    <div class="header">
        <div>
            <button onclick="startScanner()">📷 Open QR Scanner</button>
            <button onclick="addPlayer()">+ Add Player</button>
        </div>
        <div id="current-player" style="font-weight: bold; font-size: 1.2em;">Current Player: None</div>
    </div>

    <div class="action-hub">
        <h3>🏦 Fast Banking Tools</h3>
        <div class="flex-wrap">
            <button class="tool-btn" onclick="openManualTransaction()">💰 Manual Transaction</button>
            <button class="tool-btn" onclick="openRentCalculator()">📊 Rent Calculator</button>
            <button class="tool-btn" onclick="openDealBroker()">🤝 Advanced Deal Broker</button>
        </div>
    </div>

    <div id="scanner-container" style="display: none; text-align: center;">
        <div id="scanner"></div>
        <button onclick="stopScanner()" style="background:#f44336;">Close Scanner</button>
    </div>

    <div class="players" id="players-list"></div>
    <div class="board" id="board"></div>

    <div class="log-section">
        <h2>Game Log</h2>
        <div class="log" id="log"></div>
    </div>
</div>
